---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-c=.yamllint']

  # ansible-lint via hook local : invoque depuis ansible/ pour que
  # ansible.cfg soit chargé (roles_path = ./roles résolu). Le hook
  # upstream ansible/ansible-lint exec depuis le cwd Git racine, ce
  # qui rate notre topologie (cf. ADR à venir si on formalise).
  # Pré-requis : venv setup via ansible/requirements.txt.
  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint (from ansible/)
        language: system
        entry: bash -c 'cd ansible && exec ../.venv/bin/ansible-lint "$@"' --
        files: ^ansible/
        pass_filenames: false
