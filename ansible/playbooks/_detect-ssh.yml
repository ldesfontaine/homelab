---
# ===========================================================================
# Play helper — auto-détection du port SSH
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md (Décision 4)
#
# Comportement :
#   1. Probe ssh_target_port depuis localhost. Si OK → on garde les
#      credentials cibles (machine déjà bootstrapée).
#   2. Sinon, probe ssh_bootstrap_port. Si OK → on bascule ansible_user et
#      ansible_port sur les credentials bootstrap pour ce host.
#   3. Si les deux probes échouent → fail explicite avec pistes de diagnostic.
#
# Ce play est réutilisable : import_playbook dans tout playbook qui touche
# une machine du parc (VPS, futurs LXCs).
# ===========================================================================
- name: Detect SSH port and adapt credentials
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Probe SSH target port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ ssh_target_port }}"
        state: started
        timeout: 5
      delegate_to: localhost
      register: _detect_ssh_target
      failed_when: false
      check_mode: false

    - name: Use target credentials when target port is reachable
      ansible.builtin.debug:
        msg: >-
          SSH target port {{ ssh_target_port }} reachable on {{ ansible_host }}
          — using target credentials ({{ ssh_target_user }}@{{ ssh_target_port }}).
      when: _detect_ssh_target.state | default('') == 'started'

    - name: Probe SSH bootstrap port (fallback)
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ ssh_bootstrap_port }}"
        state: started
        timeout: 5
      delegate_to: localhost
      register: _detect_ssh_bootstrap
      failed_when: false
      check_mode: false
      when: _detect_ssh_target.state | default('') != 'started'

    - name: Fall back to bootstrap credentials
      ansible.builtin.set_fact:
        ansible_port: "{{ ssh_bootstrap_port }}"
        ansible_user: "{{ ssh_bootstrap_user }}"
      when:
        - _detect_ssh_target.state | default('') != 'started'
        - _detect_ssh_bootstrap.state | default('') == 'started'
      check_mode: false

    - name: Announce bootstrap credentials fallback
      ansible.builtin.debug:
        msg: >-
          SSH target port unreachable — falling back to bootstrap credentials
          ({{ ssh_bootstrap_user }}@{{ ssh_bootstrap_port }}) on {{ ansible_host }}.
      when:
        - _detect_ssh_target.state | default('') != 'started'
        - _detect_ssh_bootstrap.state | default('') == 'started'

    - name: Fail when no SSH port is reachable
      ansible.builtin.fail:
        msg: |
          No SSH port reachable on {{ ansible_host }}.
          Tested credentials:
            - target:    {{ ssh_target_user }}@{{ ansible_host }}:{{ ssh_target_port }}
            - bootstrap: {{ ssh_bootstrap_user }}@{{ ansible_host }}:{{ ssh_bootstrap_port }}
          Pistes de diagnostic :
            (a) machine reachable ? (ping ICMP, console fournisseur)
            (b) clé SSH publique déployée dans /root/.ssh/authorized_keys ?
            (c) firewall amont (Hetzner Cloud, UFW local) qui bloque ces ports ?
      when:
        - _detect_ssh_target.state | default('') != 'started'
        - _detect_ssh_bootstrap.state | default('') != 'started'
