---
# ===========================================================================
# Playbook orchestrateur — hardening lourd du VPS (session 2)
# ===========================================================================
# Prérequis : le VPS doit avoir été bootstrappé (playbooks/bootstrap.yml).
# Référence : docs/adr/ADR-000-fondations-ansible.md (Décision 5)
# Runbook   : docs/runbooks/session-2-hardening.md
#
# Ordre :
#   1. _detect-ssh.yml      — bascule transparente bootstrap/cible
#   2. login_banner         — /etc/issue.net AVANT que sshd active `Banner`
#   3. hardening (devsec)   — os_hardening + ssh_hardening
#   4. unattended_upgrades  — politique stricte Debian-Security
#   5. fail2ban             — jail sshd sur le port custom
# ===========================================================================

- name: Detect SSH state
  ansible.builtin.import_playbook: _detect-ssh.yml

- name: Harden VPS — login banner, devsec OS+SSH, unattended-upgrades, fail2ban
  hosts: vps
  gather_facts: true
  become: true

  module_defaults:
    ansible.builtin.template:
      owner: root
      group: root
      mode: '0644'
      backup: true
    ansible.builtin.copy:
      owner: root
      group: root
      mode: '0644'
      backup: true

  roles:
    - role: login_banner
      tags:
        - login-banner
    - role: hardening
      tags:
        - hardening
    - role: unattended_upgrades
      tags:
        - unattended-upgrades
    - role: fail2ban
      tags:
        - fail2ban
