---
# ===========================================================================
# Playbook orchestrateur — bootstrap d'un VPS Hetzner fraîchement provisionné
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md (Décisions 2 et 4)
# Runbook   : docs/runbooks/session-1-bootstrap-vps.md
#
# Ordre :
#   1. _detect-ssh.yml — bascule transparente entre credentials bootstrap/cible
#   2. Rôle `bootstrap` — création user deploy, durcissement sshd, bascule port
#   3. Rôle `common`   — base OS (paquets, timezone, locale, chrony)
# ===========================================================================

- name: Detect SSH state
  ansible.builtin.import_playbook: _detect-ssh.yml

- name: Bootstrap VPS — create deploy user, harden sshd, switch SSH port
  hosts: vps
  gather_facts: false
  become: true

  module_defaults:
    ansible.builtin.template:
      owner: root
      group: root
      mode: '0644'
      backup: true
    ansible.builtin.copy:
      owner: root
      group: root
      mode: '0644'
      backup: true

  roles:
    - role: bootstrap
      tags:
        - bootstrap

- name: Apply common base configuration
  hosts: vps
  gather_facts: true
  become: true

  module_defaults:
    ansible.builtin.template:
      owner: root
      group: root
      mode: '0644'
      backup: true
    ansible.builtin.copy:
      owner: root
      group: root
      mode: '0644'
      backup: true

  roles:
    - role: common
      tags:
        - common
