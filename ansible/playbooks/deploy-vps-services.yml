---
# ===========================================================================
# Playbook — déploiement des services Docker du VPS (sessions 3 et 4)
# ===========================================================================
# Prérequis : VPS bootstrappé (session 1) + hardé (session 2).
# Référence : docs/adr/ADR-000-fondations-ansible.md
#             docs/adr/ADR-002-firewall-strategy.md
# Runbooks  : docs/runbooks/session-3-docker-portfolio.md
#             docs/runbooks/session-4-pangolin-dns-cutover.md
#
# Ordre :
#   1. _detect-ssh.yml   — bascule transparente bootstrap/cible
#   2. docker            — install CE + daemon.json + groupe
#   3. ufw_docker        — couche 2 firewall (DOCKER-USER default-deny)
#   4. pangolin          — reverse proxy public (Traefik + Gerbil) + crée
#                          le réseau Docker partagé `pangolin-net`
#   5. crowdsec          — agent LAPI + parsers Traefik/sshd, rejoint
#                          pangolin-net (internal-only). Doit tourner AVANT
#                          que le portfolio ne reçoive du trafic — le plugin
#                          Traefik appelle l'agent sur crowdsec:8080.
#   6. wg_admin_hub      — hub WG admin natif (systemd wg-quick@), hors Docker.
#                          Indépendant des rôles Docker : ouvre 51821/udp en
#                          UFW INPUT classique (cf. ADR-002). Place stable
#                          entre crowdsec et portfolio pour un diff prévisible.
#   7. portfolio         — rejoint pangolin-net (internal-only), Traefik
#                          le résout via DNS Docker comme backend HTTP
#
# Important : pangolin DOIT être joué AVANT portfolio. Le rôle pangolin
# (prep.yml) crée le réseau `pangolin-net` que les compose crowdsec/portfolio
# référencent ensuite en `external: true`. crowdsec est intercalé entre les
# deux pour que les logs Traefik (passés en JSON dans pangolin) soient ingérés
# avant que le portfolio ne devienne joignable derrière le middleware bouncer.
# ===========================================================================

- name: Detect SSH state
  ansible.builtin.import_playbook: _detect-ssh.yml

- name: Install Docker, integrate ufw-docker, deploy Pangolin and portfolio
  hosts: vps
  gather_facts: true
  become: true

  module_defaults:
    ansible.builtin.template:
      owner: root
      group: root
      mode: '0644'
      backup: true
    ansible.builtin.copy:
      owner: root
      group: root
      mode: '0644'
      backup: true

  roles:
    - role: docker
      tags:
        - docker
    - role: ufw_docker
      tags:
        - ufw-docker
        - firewall
    - role: pangolin
      tags:
        - pangolin
    - role: crowdsec
      tags:
        - crowdsec
    - role: wg_admin_hub
      tags:
        - wg_admin_hub
        - wireguard
    - role: portfolio
      tags:
        - portfolio
