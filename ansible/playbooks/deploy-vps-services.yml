---
# ===========================================================================
# Playbook — déploiement des services Docker du VPS (session 3)
# ===========================================================================
# Prérequis : VPS bootstrappé (session 1) + hardé (session 2).
# Référence : docs/adr/ADR-000-fondations-ansible.md
#             docs/adr/ADR-002-firewall-strategy.md
# Runbook   : docs/runbooks/session-3-docker-portfolio.md
#
# Ordre :
#   1. _detect-ssh.yml   — bascule transparente bootstrap/cible
#   2. docker            — install CE + daemon.json + groupe
#   3. ufw_docker        — couche 2 firewall (DOCKER-USER default-deny)
#   4. portfolio         — pull image GHCR + compose + healthcheck + cron
# ===========================================================================

- name: Detect SSH state
  ansible.builtin.import_playbook: _detect-ssh.yml

- name: Install Docker, integrate ufw-docker, deploy portfolio
  hosts: vps
  gather_facts: true
  become: true

  module_defaults:
    ansible.builtin.template:
      owner: root
      group: root
      mode: '0644'
      backup: true
    ansible.builtin.copy:
      owner: root
      group: root
      mode: '0644'
      backup: true

  roles:
    - role: docker
      tags:
        - docker
    - role: ufw_docker
      tags:
        - ufw-docker
        - firewall
    - role: portfolio
      tags:
        - portfolio
