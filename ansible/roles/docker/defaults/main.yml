---
# ===========================================================================
# Variables surchargeables du rôle `docker`
# ===========================================================================
# Référence : docs.docker.com/engine/install/debian/ — installation via le
# repo officiel Docker CE (et non `docker.io` de Debian, qui est plus vieux).
# ===========================================================================

docker_apt_repo_url: "https://download.docker.com/linux/debian"
docker_apt_gpg_key_url: "https://download.docker.com/linux/debian/gpg"
docker_apt_release_channel: stable

# Paquets installés (CE + plugins buildx et compose)
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Users qui doivent pouvoir exécuter docker sans sudo
docker_users_in_group:
  - "{{ ssh_target_user }}"

# Daemon.json — configuration conservative
# - log-driver json-file rotation : sinon /var/log explose en prod
# - live-restore : conserve les containers en vie au reload daemon
# - userland-proxy false : meilleure perf et compatibilité ufw-docker
# Note : on NE met PAS "iptables": false (ADR-002) — Docker doit gérer
# iptables pour le NAT, ufw-docker s'intègre via la chaîne DOCKER-USER.
docker_daemon_config:
  log-driver: json-file
  log-opts:
    max-size: "10m"
    max-file: "5"
  live-restore: true
  userland-proxy: false
