---
# ===========================================================================
# Constantes internes au rôle `docker`
# ===========================================================================
# Préfixées par `_` selon la convention ADR-000 Décision 2.
# ===========================================================================

_docker_keyring_dir: /etc/apt/keyrings
_docker_keyring_path: /etc/apt/keyrings/docker.asc
_docker_apt_sources_path: /etc/apt/sources.list.d/docker.list
_docker_daemon_config_dir: /etc/docker
_docker_daemon_config_path: /etc/docker/daemon.json

# Mapping ansible_architecture -> arch debian pour le repo apt
_docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
