---
# ---------------------------------------------------------------------------
# Installation Docker CE depuis le repo officiel
# ---------------------------------------------------------------------------

- name: Ensure prerequisite packages are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    cache_valid_time: 3600

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: "{{ _docker_keyring_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_key_url }}"
    dest: "{{ _docker_keyring_path }}"
    owner: root
    group: root
    mode: '0644'
    force: false

- name: Deploy Docker apt source list
  ansible.builtin.copy:
    dest: "{{ _docker_apt_sources_path }}"
    content: >
      deb [arch={{ _docker_apt_arch_map[ansible_architecture] | default(ansible_architecture) }}
      signed-by={{ _docker_keyring_path }}]
      {{ docker_apt_repo_url }}
      {{ ansible_distribution_release }}
      {{ docker_apt_release_channel }}
    owner: root
    group: root
    mode: '0644'
    backup: true
  register: _docker_apt_sources

- name: Refresh apt cache after Docker repo configuration
  ansible.builtin.apt:
    update_cache: true
  when: _docker_apt_sources.changed  # noqa: no-handler

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    cache_valid_time: 3600

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
