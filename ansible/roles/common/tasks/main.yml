---
# ===========================================================================
# Rôle `common` — entrée principale
# ===========================================================================
# Le fichier `main.yml` ne contient que des include_tasks vers les sous-
# fichiers thématiques. Chaque sous-fichier porte le tag du rôle ainsi qu'un
# tag spécifique à sa responsabilité, pour permettre des runs ciblés.
# ===========================================================================

- name: Install base packages
  ansible.builtin.include_tasks: packages.yml
  tags:
    - common
    - common-packages

- name: Configure timezone and locale
  ansible.builtin.include_tasks: timezone-locale.yml
  tags:
    - common
    - common-timezone
    - common-locale

- name: Configure chrony (NTP)
  ansible.builtin.include_tasks: chrony.yml
  tags:
    - common
    - common-chrony
