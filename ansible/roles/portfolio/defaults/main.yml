---
# ===========================================================================
# Variables surchargeables du rôle `portfolio`
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md (Décision 6)
#             docs/adr/ADR-002-firewall-strategy.md
# ===========================================================================

# ───────────────────────────────────────────────────────────────────────────
# Image — pull GHCR (cf. ADR-000 Décision 6, pas de build sur le VPS)
# ───────────────────────────────────────────────────────────────────────────
portfolio_image: "ghcr.io/ldesfontaine/portfolio"
portfolio_image_tag: "0.0.4"                            # incrémenter pour upgrade

# ───────────────────────────────────────────────────────────────────────────
# Configuration applicative
# ───────────────────────────────────────────────────────────────────────────
portfolio_site_url: "https://{{ homelab_fqdn_portfolio }}"
portfolio_goatcounter_vhost: "{{ homelab_fqdn_portfolio }}"
portfolio_payload_secret: "{{ vault_portfolio_payload_secret }}"
portfolio_container_port: 3000

# Session 3 : binding 127.0.0.1 (testable via SSH tunnel local).
# Session 4 (Pangolin) : false par défaut — le container devient
# internal-only et joignable via {{ portfolio_docker_networks }} (en
# particulier `pangolin-net`, partagé avec Traefik). Override possible
# (`-e portfolio_bind_localhost=true`) pour rollback ou debug local.
portfolio_bind_localhost: false

# ───────────────────────────────────────────────────────────────────────────
# Stockage (cf. README portfolio)
# ───────────────────────────────────────────────────────────────────────────
portfolio_compose_dir: /opt/portfolio
portfolio_data_volume: portfolio-data
portfolio_media_volume: portfolio-media

# ───────────────────────────────────────────────────────────────────────────
# Réseaux Docker — le container est attaché à plusieurs réseaux :
#   * portfolio-net : réseau dédié, isolé (futurs sidecars/agents périphériques)
#   * pangolin-net  : partagé avec Pangolin/Traefik, qui résout `portfolio`
#                     via le DNS Docker interne (cf. dynamic_config.yml du
#                     rôle pangolin → backend `http://portfolio:3000`)
# Le rôle `pangolin` est responsable de la création de pangolin-net (prep.yml),
# le rôle `portfolio` ne fait que le référencer en `external: true` ici.
# ───────────────────────────────────────────────────────────────────────────
portfolio_docker_networks:
  - portfolio-net
  - pangolin-net

# ───────────────────────────────────────────────────────────────────────────
# Backups : NON gérés ici.
# Le repo termfolio expose une UI Payload sur /admin
# (« Sauvegarde & restauration », endpoints /api/snapshot et
# /api/snapshot/restore) — les snapshots sont déclenchés manuellement
# depuis là. Pas de cron host-side : le script /app/scripts/backup.sh
# évoqué dans le README portfolio n'existe pas dans l'image. Ne PAS
# réintroduire de tâche cron Ansible ici sans relire ce commentaire.
# ───────────────────────────────────────────────────────────────────────────
