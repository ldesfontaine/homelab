---
# ===========================================================================
# Constantes internes au rôle `wg_admin_hub`
# ===========================================================================
# Préfixées par `_` selon la convention ADR-000 Décision 2.
# ===========================================================================

_wg_admin_hub_config_dir: "/etc/wireguard"
_wg_admin_hub_config_file: "{{ _wg_admin_hub_config_dir }}/{{ wg_admin_hub_interface_name }}.conf"
_wg_admin_hub_private_key_path: "{{ _wg_admin_hub_config_dir }}/{{ wg_admin_hub_interface_name }}.key"
_wg_admin_hub_public_key_path: "{{ _wg_admin_hub_config_dir }}/{{ wg_admin_hub_interface_name }}.pub"
_wg_admin_hub_systemd_unit: "wg-quick@{{ wg_admin_hub_interface_name }}.service"

# Persiste net.ipv4.ip_forward au reboot, en complément du PostUp dans la conf
# WG (lui ne s'applique que si l'interface se monte ; le sysctl.d le garantit
# au boot inconditionnellement, utile si le futur peer OPNsense doit router
# son LAN à travers ce hub).
_wg_admin_hub_sysctl_file: "/etc/sysctl.d/99-wireguard-forward.conf"
