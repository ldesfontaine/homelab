---
# ===========================================================================
# Rôle `wg_admin_hub` — déploiement du hub WG admin natif (systemd wg-quick@)
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md
#             docs/adr/ADR-002-firewall-strategy.md (UDP 51821 ouvert en
#               UFW INPUT classique — natif host, hors DOCKER-USER)
# Runbook   : docs/runbooks/session-6-wireguard-hub.md
# ===========================================================================
# Idempotence :
#   - privkey générée UNIQUEMENT si absente (`creates:`)
#   - pubkey dérivée à chaque run (read-only, changed_when: false)
#   - 2ème run consécutif → changed=0
# Secrets :
#   - la privkey ne quitte JAMAIS le VPS (aucune var persistée hors fichier)
#   - toutes les tasks qui la manipulent portent `no_log: true`
#   - la pubkey EST publique : pas de no_log, affichage final en debug
# ===========================================================================

- name: Install the wireguard package
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure /etc/wireguard exists with strict perms
  ansible.builtin.file:
    path: "{{ _wg_admin_hub_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

# Génération idempotente : `creates:` empêche la régénération si la clé
# existe déjà. Le `umask 077` garantit 0600 dès la création (avant même
# que la task suivante ne force le mode).
- name: Generate the WireGuard private key (only if absent)
  ansible.builtin.shell: "umask 077 && wg genkey > {{ _wg_admin_hub_private_key_path }}"
  args:
    creates: "{{ _wg_admin_hub_private_key_path }}"

- name: Enforce 0600 perms on the WireGuard private key
  ansible.builtin.file:
    path: "{{ _wg_admin_hub_private_key_path }}"
    state: file
    owner: root
    group: root
    mode: '0600'

- name: Read the WireGuard private key
  ansible.builtin.slurp:
    src: "{{ _wg_admin_hub_private_key_path }}"
  register: _wg_admin_hub_privkey_slurp
  no_log: true

# `trim` retire le `\n` ajouté par `wg genkey` à l'écriture du fichier.
- name: Stash the private key as an in-memory fact
  ansible.builtin.set_fact:
    _wg_admin_hub_private_key: "{{ _wg_admin_hub_privkey_slurp.content | b64decode | trim }}"
  no_log: true

# Read-only — exécuté aussi en --check pour que les tasks suivantes (debug,
# render template en check_mode) aient une valeur. `stdin_add_newline: false`
# évite l'octet parasite que `wg pubkey` rejette parfois selon la version.
- name: Derive the WireGuard public key from the private key
  ansible.builtin.command:
    cmd: wg pubkey
    stdin: "{{ _wg_admin_hub_private_key }}"
    stdin_add_newline: false
  register: _wg_admin_hub_pubkey_result
  changed_when: false
  check_mode: false
  no_log: true

- name: Stash the public key as a fact
  ansible.builtin.set_fact:
    _wg_admin_hub_public_key: "{{ _wg_admin_hub_pubkey_result.stdout | trim }}"

# La pubkey est publique par définition (distribuée aux clients) — perms
# normales `0644` et pas de no_log. Sert aussi de fallback hors-Ansible
# (`sudo cat /etc/wireguard/wg-admin.pub` côté VPS).
- name: Persist the WireGuard public key to disk
  ansible.builtin.copy:
    content: "{{ _wg_admin_hub_public_key }}\n"
    dest: "{{ _wg_admin_hub_public_key_path }}"
    owner: root
    group: root
    mode: '0644'

- name: Deploy the WireGuard hub configuration
  ansible.builtin.template:
    src: wg-admin.conf.j2
    dest: "{{ _wg_admin_hub_config_file }}"
    owner: root
    group: root
    mode: '0600'
    backup: true
  no_log: true   # le template contient PrivateKey en clair
  notify: Restarting wireguard hub

# Persistance reboot du forwarding IPv4. Le PostUp de la conf wg-admin pose
# déjà le sysctl, mais ne s'applique que si l'interface monte. Ce fichier
# garantit l'état même si wg-quick est down (utile au boot froid).
- name: Persist net.ipv4.ip_forward across reboots
  ansible.builtin.copy:
    content: |
      # {{ ansible_managed }}
      # Forward IPv4 -- required by the wg-admin hub so the future OPNsense
      # peer can route its LAN traffic through this tunnel. The wg-admin
      # PostUp also sets it at interface bring-up, but this file applies
      # at boot before any unit starts.
      net.ipv4.ip_forward = 1
    dest: "{{ _wg_admin_hub_sysctl_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Reloading sysctl

# UFW classique (INPUT host) — PAS `route: true` : c'est natif host, hors
# Docker, donc pas de chaîne DOCKER-USER à traverser. Cf. ADR-002 — table
# des ports publics autorisés.
- name: Allow inbound WireGuard admin port via UFW
  community.general.ufw:
    rule: allow
    proto: udp
    port: "{{ wg_admin_hub_listen_port }}"
    comment: "WireGuard admin hub (wg-admin)"

- name: Enable and start the wg-quick unit for the admin hub
  ansible.builtin.systemd:
    name: "{{ _wg_admin_hub_systemd_unit }}"
    enabled: true
    state: started
    daemon_reload: true

# Force le restart pending (handler) AVANT le health check, sinon on lit
# l'état d'une interface qui peut tourner avec une conf obsolète.
- name: Flush handlers so any pending wg restart happens before the health check
  ansible.builtin.meta: flush_handlers

- name: Verify the WireGuard interface is up
  ansible.builtin.command:
    cmd: "wg show {{ wg_admin_hub_interface_name }}"
  register: _wg_admin_hub_show
  retries: 10
  delay: 2
  until: _wg_admin_hub_show.rc == 0
  changed_when: false
  check_mode: false

# Récap pour Lucas : il copie ces valeurs dans ses fichiers laptop.conf /
# phone.conf en local. Aucun no_log : la pubkey est publique, l'endpoint et
# les CIDR aussi. Pas de privkey dans la sortie.
- name: Show client-side connection info
  ansible.builtin.debug:
    msg: |
      WireGuard admin hub is up on UDP {{ wg_admin_hub_listen_port }}.

      Hub public key (copy into client [Peer] sections):
        {{ _wg_admin_hub_public_key }}

      Client config:
        Endpoint   = {{ wg_admin_hub_endpoint_fqdn }}:{{ wg_admin_hub_listen_port }}
        AllowedIPs = {{ wg_admin_hub_subnet }}
        Hub tunnel address = {{ wg_admin_hub_address }}

      Configured peers (name -> tunnel IP):
      {% for p in wg_admin_hub_peers %}
        - {{ p.name }} -> {{ p.allowed_ips }}
      {% endfor %}
