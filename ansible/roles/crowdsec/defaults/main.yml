---
# ===========================================================================
# Variables surchargeables du rôle `crowdsec`
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md
#             docs/adr/ADR-002-firewall-strategy.md (container internal-only)
# Runbook   : docs/runbooks/session-5-crowdsec.md
# Plugin Traefik associé : pangolin_traefik_plugin_crowdsec_version (rôle pangolin).
# ===========================================================================

# ───────────────────────────────────────────────────────────────────────────
# Image — épingler explicitement (anti-pattern :latest, cf. CLAUDE.md)
# Vérifier la dernière LTS sur https://hub.docker.com/r/crowdsecurity/crowdsec/tags
# ───────────────────────────────────────────────────────────────────────────
crowdsec_image: "docker.io/crowdsecurity/crowdsec"
crowdsec_image_tag: "v1.7.8"

# ───────────────────────────────────────────────────────────────────────────
# Arborescence sur l'host
# ───────────────────────────────────────────────────────────────────────────
crowdsec_install_dir: "/opt/crowdsec"
crowdsec_config_dir: "{{ crowdsec_install_dir }}/config"
crowdsec_data_dir: "{{ crowdsec_install_dir }}/data"

# Chemin host des logs Traefik — bind-mount RO côté agent.
# DOIT correspondre à `_pangolin_traefik_logs_dir` (rôle pangolin).
crowdsec_traefik_logs_host_path: "/opt/pangolin/config/traefik/logs"

# Chemin host du log auth (sshd). Le rôle hardening installe déjà fail2ban,
# mais la collection sshd CrowdSec ajoute corrélation et CTI communautaire.
crowdsec_auth_log_host_path: "/var/log/auth.log"

# ───────────────────────────────────────────────────────────────────────────
# Collections / parsers hub — installés via env COLLECTIONS au boot
# (idempotent : cscli détecte les collections déjà présentes).
# ───────────────────────────────────────────────────────────────────────────
crowdsec_collections:
  - crowdsecurity/traefik
  - crowdsecurity/base-http-scenarios
  - crowdsecurity/sshd
  - crowdsecurity/linux

# ───────────────────────────────────────────────────────────────────────────
# Politique d'escalation des bans (en heures) — appliquée par profiles.yaml
# Choix : pas de captcha (décision projet session 5) — uniquement des bans.
# ───────────────────────────────────────────────────────────────────────────
crowdsec_ban_critical_hours: 24    # http-cve, http-bf
crowdsec_ban_high_hours: 4         # http-probing, http-sensitive-files
crowdsec_ban_medium_hours: 1       # http-crawl-non_statics, defaults

# ───────────────────────────────────────────────────────────────────────────
# Bouncer Traefik — nom logique côté agent (cscli bouncers ...)
# La clé partagée vit dans le vault sous `vault_crowdsec_bouncer_key`
# et est consommée par le plugin Traefik (middleware crowdsec-bouncer).
# ───────────────────────────────────────────────────────────────────────────
crowdsec_bouncer_name: "traefik-bouncer"

# ───────────────────────────────────────────────────────────────────────────
# Réseau Docker partagé avec Pangolin / Traefik (created par le rôle pangolin)
# CrowdSec NE PUBLIE AUCUN PORT (cf. ADR-002 : Pangolin est l'unique frontal).
# ───────────────────────────────────────────────────────────────────────────
crowdsec_docker_network: "pangolin-net"

# ───────────────────────────────────────────────────────────────────────────
# Enrôlement CrowdSec Console (optionnel)
#   - laisser vide      → agent isolé (DISABLE_ONLINE_API=true, pas de CTI)
#   - clé d'enrolement  → agent enrôlé, polling CAPI activé, blocklists CTI
# Procédure d'enrôlement détaillée dans le runbook session-5.
# ───────────────────────────────────────────────────────────────────────────
crowdsec_enroll_key: "{{ vault_crowdsec_enroll_key | default('') }}"
crowdsec_bouncer_key: "{{ vault_crowdsec_bouncer_key }}"
