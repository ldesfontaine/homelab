---
# Reload soft : recharge acquis.yaml / profiles.yaml sans casser la LAPI ni
# perdre les bouncers connectés. Le binaire crowdsec écoute SIGHUP.
- name: Reloading crowdsec
  community.docker.docker_container_exec:
    container: "{{ _crowdsec_container_name }}"
    argv: ["/bin/sh", "-c", "kill -HUP 1"]
  changed_when: true

# Fallback brutal — utilisé seulement si le SIGHUP ne suffit pas (changement
# de version d'image, ajout d'une collection runtime, etc.).
- name: Restarting crowdsec
  community.docker.docker_compose_v2:
    project_src: "{{ crowdsec_install_dir }}"
    services:
      - "{{ _crowdsec_container_name }}"
    state: restarted
