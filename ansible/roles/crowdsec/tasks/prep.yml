---
# ---------------------------------------------------------------------------
# Préparation : arborescence /opt/crowdsec/{config,data} + docker-compose.yml
# ---------------------------------------------------------------------------

- name: Ensure CrowdSec directory tree exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  loop:
    - "{{ crowdsec_install_dir }}"
    - "{{ crowdsec_config_dir }}"
    - "{{ crowdsec_data_dir }}"

- name: Deploy CrowdSec docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ _crowdsec_compose_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true

# Vérifie que le réseau Docker partagé existe — created par le rôle pangolin
# (prep.yml). Si le rôle pangolin n'a pas été joué, la task échoue tôt avec
# un message explicite plutôt que de planter au compose up.
- name: Assert shared Docker network exists ({{ crowdsec_docker_network }})
  community.docker.docker_network_info:
    name: "{{ crowdsec_docker_network }}"
  register: _crowdsec_net_info
  failed_when:
    - not _crowdsec_net_info.exists
