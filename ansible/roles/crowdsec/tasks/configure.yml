---
# ---------------------------------------------------------------------------
# Configuration runtime (post-seed) :
#   1. overlay acquis.yaml (sources de logs) et profiles.yaml (escalation)
#   2. enregistrer le bouncer Traefik avec la clé du vault (idempotent)
#   3. (optionnel) enrôler l'agent auprès de la CrowdSec Console
# Tout changement de conf déclenche le handler `reloading crowdsec`
# (SIGHUP — pas de coupure des bouncers connectés).
# ---------------------------------------------------------------------------

- name: Deploy CrowdSec acquis.yaml (Traefik JSON + sshd)
  ansible.builtin.template:
    src: acquis.yaml.j2
    dest: "{{ _crowdsec_acquis_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Reloading crowdsec

- name: Deploy CrowdSec profiles.yaml (escalation policy — ban only)
  ansible.builtin.template:
    src: profiles.yaml.j2
    dest: "{{ _crowdsec_profiles_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Reloading crowdsec

# ─── Bouncer Traefik ────────────────────────────────────────────────────────
# Idempotent : on liste d'abord, on ajoute seulement si absent.
- name: List existing CrowdSec bouncers
  community.docker.docker_container_exec:
    container: "{{ _crowdsec_container_name }}"
    argv: ["cscli", "bouncers", "list", "-o", "json"]
  register: _crowdsec_bouncers_raw
  changed_when: false

- name: Compute existing bouncer names
  ansible.builtin.set_fact:
    _crowdsec_bouncers_existing: >-
      {{ (_crowdsec_bouncers_raw.stdout | from_json)
         | map(attribute='name') | list }}

- name: Register Traefik bouncer with predefined key
  community.docker.docker_container_exec:
    container: "{{ _crowdsec_container_name }}"
    argv:
      - cscli
      - bouncers
      - add
      - "{{ crowdsec_bouncer_name }}"
      - "--key"
      - "{{ crowdsec_bouncer_key }}"
  when: crowdsec_bouncer_name not in _crowdsec_bouncers_existing
  no_log: true

# ─── Enrôlement Console (optionnel) ────────────────────────────────────────
# `vault_crowdsec_enroll_key` vide = pas d'enrôlement (agent isolé).
# Une fois rempli + replay du playbook, l'agent rejoint app.crowdsec.net
# et on peut activer les blocklists CTI côté dashboard.
#
# `cscli console enroll` n'est pas idempotent : succès au premier run, exit
# code != 0 quand l'agent est déjà enrôlé. On lit le status JSON avant pour
# skipper proprement aux runs suivants. À l'enrôlement, cscli active par
# défaut les quatre flags de partage (context/custom/manual/tainted) — leur
# état sert donc de marqueur "agent enrôlé".
- name: Check current CrowdSec Console enrollment status
  community.docker.docker_container_exec:
    container: "{{ _crowdsec_container_name }}"
    argv: ["cscli", "console", "status", "-o", "json"]
  register: _crowdsec_console_status
  changed_when: false
  failed_when: false
  when: crowdsec_enroll_key | length > 0

- name: Compute CrowdSec Console enrollment marker
  ansible.builtin.set_fact:
    _crowdsec_console_enrolled: >-
      {{ (_crowdsec_console_status.rc | default(1)) == 0
         and ((_crowdsec_console_status.stdout | default('{}') | from_json)
              | dict2items
              | selectattr('key', 'in', ['context', 'custom', 'manual', 'tainted'])
              | selectattr('value', 'equalto', true)
              | list | length) > 0 }}
  when: crowdsec_enroll_key | length > 0

- name: Enroll agent in CrowdSec Console (optional)
  community.docker.docker_container_exec:
    container: "{{ _crowdsec_container_name }}"
    argv:
      - cscli
      - console
      - enroll
      - "--name"
      - "{{ inventory_hostname }}"
      - "{{ crowdsec_enroll_key }}"
  register: _crowdsec_enroll
  changed_when:
    - _crowdsec_enroll.rc == 0
    - "'enrolled' in (_crowdsec_enroll.stdout | default(''))"
  failed_when:
    - _crowdsec_enroll.rc != 0
    - "'already enrolled' not in (_crowdsec_enroll.stderr | default(''))"
    - "'already enrolled' not in (_crowdsec_enroll.stdout | default(''))"
  when:
    - crowdsec_enroll_key | length > 0
    - not (_crowdsec_console_enrolled | default(false))
  no_log: true
  notify: Restarting crowdsec
