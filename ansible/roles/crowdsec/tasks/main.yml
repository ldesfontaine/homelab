---
# ===========================================================================
# Rôle `crowdsec` — fichier chapeau (include les sous-fichiers thématiques)
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md
#             docs/adr/ADR-002-firewall-strategy.md (aucun port host publié)
# Runbook   : docs/runbooks/session-5-crowdsec.md
# ===========================================================================
#
# Ordre :
#   1. prep      : arborescence host + docker-compose.yml
#   2. deploy    : pull image, compose state:present, attente LAPI healthy
#   3. configure : overlay acquis.yaml / profiles.yaml (post-seed entrypoint)
#                  + création bouncer + enrôlement Console (optionnel)

- name: Prepare crowdsec directories and compose file
  ansible.builtin.include_tasks: prep.yml
  tags:
    - crowdsec
    - crowdsec-prep

- name: Deploy CrowdSec agent and wait for LAPI readiness
  ansible.builtin.include_tasks: deploy.yml
  tags:
    - crowdsec
    - crowdsec-deploy

- name: Overlay acquis/profiles, register bouncer, optional Console enroll
  ansible.builtin.include_tasks: configure.yml
  tags:
    - crowdsec
    - crowdsec-configure
