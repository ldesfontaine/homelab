---
# ---------------------------------------------------------------------------
# Déploiement : pull image, compose up, attente LAPI healthy.
# ---------------------------------------------------------------------------

- name: Pull CrowdSec image
  community.docker.docker_image:
    name: "{{ crowdsec_image }}:{{ crowdsec_image_tag }}"
    source: pull

# Premier `state: present` : l'entrypoint upstream copie ses configs par
# défaut dans /etc/crowdsec/ (= {{ crowdsec_config_dir }} côté host) et
# installe les collections listées via env COLLECTIONS. On overlay nos
# acquis.yaml et profiles.yaml dans configure.yml une fois cette graine posée.
- name: Start CrowdSec container via compose
  community.docker.docker_compose_v2:
    project_src: "{{ crowdsec_install_dir }}"
    state: present
    pull: missing

- name: Wait for upstream entrypoint to seed /etc/crowdsec/config.yaml
  ansible.builtin.wait_for:
    path: "{{ _crowdsec_config_seed_marker }}"
    state: present
    timeout: 60

- name: Wait for CrowdSec LAPI to be ready (cscli lapi status)
  community.docker.docker_container_exec:
    container: "{{ _crowdsec_container_name }}"
    argv: ["cscli", "lapi", "status"]
  register: _crowdsec_lapi_status
  retries: 30
  delay: 2
  until: _crowdsec_lapi_status.rc == 0
  changed_when: false
