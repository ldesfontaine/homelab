---
# ===========================================================================
# Rôle `login_banner` — déploiement de /etc/issue.net
# ===========================================================================
# La directive `Banner /etc/issue.net` côté sshd est posée par
# devsec.hardening.ssh_hardening (rôle `hardening`, variables `ssh_banner`
# et `ssh_banner_path`). Ce rôle se contente d'écrire le fichier — il doit
# donc s'exécuter AVANT le rôle `hardening` dans le playbook (sinon sshd
# émet un warning au reload si /etc/issue.net est absent).
# ===========================================================================

- name: Deploy login banner /etc/issue.net
  ansible.builtin.template:
    src: issue.net.j2
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'
    backup: true
  tags:
    - login-banner
