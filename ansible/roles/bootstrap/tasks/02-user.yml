---
# Création du user cible, déploiement des clés SSH admin, configuration sudo.
# Étape exécutée AVANT toute reconfiguration sshd qui restreint AllowUsers.

- name: Refresh apt cache (max 1h)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Ensure deploy primary group exists
  ansible.builtin.group:
    name: "{{ bootstrap_target_user }}"
    state: present

- name: Ensure deploy user exists with locked password
  ansible.builtin.user:
    name: "{{ bootstrap_target_user }}"
    group: "{{ bootstrap_target_user }}"
    groups:
      - sudo
    append: true
    shell: /bin/bash
    create_home: true
    password: '!'
    password_lock: true
    state: present

- name: Ensure deploy ~/.ssh directory has restrictive permissions
  ansible.builtin.file:
    path: "/home/{{ bootstrap_target_user }}/.ssh"
    state: directory
    owner: "{{ bootstrap_target_user }}"
    group: "{{ bootstrap_target_user }}"
    mode: '0700'

- name: Install admin SSH public keys for deploy
  ansible.posix.authorized_key:
    user: "{{ bootstrap_target_user }}"
    path: "/home/{{ bootstrap_target_user }}/.ssh/authorized_keys"
    key: "{{ bootstrap_admin_ssh_keys | join('\n') }}"
    state: present
    exclusive: true
    manage_dir: false
  no_log: true

- name: Enforce 0600 on deploy authorized_keys
  ansible.builtin.file:
    path: "/home/{{ bootstrap_target_user }}/.ssh/authorized_keys"
    state: file
    owner: "{{ bootstrap_target_user }}"
    group: "{{ bootstrap_target_user }}"
    mode: '0600'

- name: Install NOPASSWD sudoers drop-in for deploy
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ bootstrap_target_user }}"
    content: "{{ bootstrap_target_user }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    backup: true
    validate: "{{ _bootstrap_sudoers_validate_cmd }}"
