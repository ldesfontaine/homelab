---
# UFW transitional : on autorise SIMULTANÉMENT le port bootstrap (22) et le
# port cible (2203) AVANT de toucher sshd. Si on activait UFW après le reload
# sshd, il existerait une fenêtre où sshd écoute déjà sur 2203 sans firewall
# devant — inacceptable même si elle est courte.

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    cache_valid_time: 3600

- name: Set UFW default policy — deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set UFW default policy — allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH bootstrap port (transitional)
  community.general.ufw:
    rule: allow
    port: "{{ bootstrap_bootstrap_port | string }}"
    proto: tcp
    comment: "SSH bootstrap (transitional)"

- name: Allow SSH target port
  community.general.ufw:
    rule: allow
    port: "{{ bootstrap_target_port | string }}"
    proto: tcp
    comment: "SSH target"

- name: Enable UFW logging
  community.general.ufw:
    logging: 'on'

- name: Enable UFW
  community.general.ufw:
    state: enabled
