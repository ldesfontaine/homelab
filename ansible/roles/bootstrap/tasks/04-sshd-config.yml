---
# Bascule de la conf sshd vers le port cible + hardening de base.
# Le `validate` empêche tout reload sur une conf cassée (sshd -t exit != 0).
# Le bloc rescue garantit qu'en cas d'échec, on stoppe le play avec un message
# clair pointant vers le backup créé automatiquement par le module template.

- name: Deploy hardened sshd configuration
  block:
    - name: Render and validate sshd_config
      ansible.builtin.template:
        src: sshd_config.j2
        dest: "{{ _bootstrap_sshd_config_path }}"
        owner: root
        group: root
        mode: '0644'
        backup: true
        validate: "{{ _bootstrap_sshd_validate_cmd }}"
      notify: Restarting sshd

    - name: Flush handlers to reload sshd immediately
      ansible.builtin.meta: flush_handlers

  rescue:
    - name: Report sshd deployment failure
      ansible.builtin.fail:
        msg: |
          Déploiement sshd_config échoué.
          Un backup horodaté a été créé à côté de {{ _bootstrap_sshd_config_path }}
          (format : sshd_config.<timestamp>.<random>.bak — module Ansible `template`
          ne fait PAS de restauration automatique). Pour rétablir l'état précédent :
              1. Se reconnecter via la console du provider (Hetzner)
              2. Identifier le backup : ls -la /etc/ssh/sshd_config*.bak
              3. Restaurer : cp <backup> /etc/ssh/sshd_config
              4. Relancer : systemctl reload ssh
