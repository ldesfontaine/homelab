---
# Bascule de la connexion Ansible sur les credentials cibles, puis vérification
# active via ping. Si la vérification échoue, on fail avec un message
# d'instructions de récupération (console fournisseur requise).

- name: Reset SSH connection before switching credentials
  ansible.builtin.meta: reset_connection

- name: Switch Ansible connection to target credentials  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    # ansible_user / ansible_port sont des variables magiques Ansible
    # (cf. Special Variables), pas des variables de rôle — le préfixe
    # `bootstrap_` ne s'applique pas ici.
    ansible_user: "{{ bootstrap_target_user }}"
    ansible_port: "{{ bootstrap_target_port }}"

- name: Wait for SSH availability on target port
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ bootstrap_target_port }}"
    state: started
    delay: 2
    timeout: "{{ bootstrap_post_switch_wait_timeout }}"
  delegate_to: localhost
  become: false

- name: Verify target SSH connectivity (ping)
  ansible.builtin.ping:
  register: _bootstrap_post_switch_ping
  failed_when: _bootstrap_post_switch_ping.ping is not defined or _bootstrap_post_switch_ping.ping != 'pong'

- name: Confirm successful credential switch
  ansible.builtin.debug:
    msg: >-
      Successfully switched to {{ ansible_user }}@{{ ansible_host }}:{{ ansible_port }}.
