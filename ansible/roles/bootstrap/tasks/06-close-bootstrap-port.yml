---
# Une fois la bascule vérifiée (étape 05), on retire la règle UFW qui autorisait
# le port bootstrap. On utilise `delete: true` plutôt qu'un `rule: deny`
# additionnel : la table reste propre, pas d'empilement de règles de directions
# contradictoires.

- name: Remove transitional SSH bootstrap allow rule
  community.general.ufw:
    rule: allow
    port: "{{ bootstrap_bootstrap_port | string }}"
    proto: tcp
    delete: true

- name: Announce bootstrap completion
  ansible.builtin.debug:
    msg: >-
      Bootstrap complete — port {{ bootstrap_bootstrap_port }} closed,
      SSH on {{ bootstrap_target_port }} as {{ bootstrap_target_user }}.
