---
# ===========================================================================
# Rôle `bootstrap` — entrée principale
# ===========================================================================
# Séquence d'opérations critique — l'ordre est non négociable (cf. Décision 4
# de l'ADR-000). Toutes les étapes sont skipées si la machine est déjà
# bootstrapée (détection en 01).
# ===========================================================================

- name: Detect bootstrap state
  ansible.builtin.include_tasks: 01-detect-state.yml
  tags:
    - bootstrap
    - bootstrap-detect

- name: Create deploy user, deploy SSH keys, configure sudo
  ansible.builtin.include_tasks: 02-user.yml
  when: not _bootstrap_already_done
  tags:
    - bootstrap
    - bootstrap-user

- name: Install and configure transitional UFW rules
  ansible.builtin.include_tasks: 03-ufw-transitional.yml
  when: not _bootstrap_already_done
  tags:
    - bootstrap
    - bootstrap-ufw

- name: Deploy sshd configuration and reload service
  ansible.builtin.include_tasks: 04-sshd-config.yml
  when: not _bootstrap_already_done
  tags:
    - bootstrap
    - bootstrap-sshd

- name: Validate target SSH and switch connection
  ansible.builtin.include_tasks: 05-validate-and-switch.yml
  when: not _bootstrap_already_done
  tags:
    - bootstrap
    - bootstrap-switch

- name: Close transitional bootstrap port
  ansible.builtin.include_tasks: 06-close-bootstrap-port.yml
  when: not _bootstrap_already_done
  tags:
    - bootstrap
    - bootstrap-ufw
