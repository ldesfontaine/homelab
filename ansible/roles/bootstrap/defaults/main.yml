---
# ===========================================================================
# Variables surchargeables du rôle `bootstrap`
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md (Décision 4)
# ===========================================================================

# User cible et ports SSH — repris des group_vars (override possible).
bootstrap_target_user: "{{ ssh_target_user }}"
bootstrap_target_port: "{{ ssh_target_port }}"
bootstrap_bootstrap_port: "{{ ssh_bootstrap_port }}"

# Liste des clés publiques admin à déployer dans ~deploy/.ssh/authorized_keys.
bootstrap_admin_ssh_keys: "{{ admin_ssh_public_keys }}"

# Options sshd durcies — niveau "bootstrap raisonnable".
# Les ciphers/KEX/MACs et le hardening lourd viendront en session 2 via
# `devsec.hardening`, qui complétera (et n'écrasera pas) cette config.
bootstrap_sshd_permit_root_login: "no"
bootstrap_sshd_password_authentication: "no"
bootstrap_sshd_pubkey_authentication: "yes"
bootstrap_sshd_max_auth_tries: 3
bootstrap_sshd_client_alive_interval: 300
bootstrap_sshd_client_alive_count_max: 2

# Timeout (secondes) du wait_for de re-probe après bascule de port.
bootstrap_post_switch_wait_timeout: 30
