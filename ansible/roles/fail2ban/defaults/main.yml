---
# ===========================================================================
# Variables surchargeables du rôle `fail2ban`
# ===========================================================================

# Defaults globaux — appliqués à toutes les jails sauf override par jail
fail2ban_bantime: 1h
fail2ban_findtime: 10m
fail2ban_maxretry: 5
# Backend journald : Debian 13 logue sshd via systemd-journald, pas dans
# /var/log/auth.log par défaut. `systemd` est le backend natif côté fail2ban.
fail2ban_backend: systemd

# Jail SSH — activée par défaut, écoute le port custom posé par bootstrap
fail2ban_sshd_enabled: true
fail2ban_sshd_port: "{{ ssh_target_port }}"
fail2ban_sshd_maxretry: 3
fail2ban_sshd_bantime: 1h

# IPs jamais bannies. Compléter via group_vars/all/vars.yml ou
# group_vars/vps/vars.yml si une IP fixe d'admin est connue.
fail2ban_ignoreip:
  - 127.0.0.1/8
  - ::1
