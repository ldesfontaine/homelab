---
# ===========================================================================
# Rôle `fail2ban` — installation et configuration de la jail SSH
# ===========================================================================

- name: Install fail2ban
  ansible.builtin.apt:
    name: "{{ _fail2ban_package }}"
    state: present
    cache_valid_time: 3600
  tags:
    - fail2ban

- name: Deploy fail2ban jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: "{{ _fail2ban_jail_local_path }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Restarting fail2ban
  tags:
    - fail2ban

- name: Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  tags:
    - fail2ban
