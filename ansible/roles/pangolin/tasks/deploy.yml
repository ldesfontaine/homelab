---
# ---------------------------------------------------------------------------
# Déploiement : templates compose + configs, pull images, up, healthcheck.
# ---------------------------------------------------------------------------

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ _pangolin_compose_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true

- name: Deploy .env file (Cloudflare API token — restricted perms)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ _pangolin_env_file }}"
    owner: root
    group: root
    mode: '0600'
    backup: true
  no_log: true

- name: Deploy Pangolin server config (config.yml)
  ansible.builtin.template:
    src: pangolin_config.yml.j2
    dest: "{{ _pangolin_config_dir }}/config.yml"
    owner: root
    group: root
    mode: '0640'
    backup: true
  no_log: true   # contient server.secret

- name: Deploy Traefik static config (traefik_config.yml)
  ansible.builtin.template:
    src: traefik_config.yml.j2
    dest: "{{ _pangolin_traefik_config_dir }}/traefik_config.yml"
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Restarting traefik

- name: Deploy Traefik dynamic config (dynamic_config.yml)
  ansible.builtin.template:
    src: dynamic_config.yml.j2
    dest: "{{ _pangolin_traefik_config_dir }}/dynamic_config.yml"
    owner: root
    group: root
    mode: '0644'
    backup: true
  # Contient désormais vault_crowdsec_bouncer_key (middleware bouncer).
  # Traefik recharge ce fichier à chaud (watch: true), pas de handler.
  no_log: true

- name: Pull Pangolin / Gerbil / Traefik images
  community.docker.docker_image:
    name: "{{ item }}"
    source: pull
  loop:
    - "{{ pangolin_image }}:{{ pangolin_version }}"
    - "{{ pangolin_gerbil_image }}:{{ pangolin_gerbil_version }}"
    - "{{ pangolin_traefik_image }}:{{ pangolin_traefik_version }}"

- name: Start Pangolin stack via compose
  community.docker.docker_compose_v2:
    project_src: "{{ pangolin_compose_dir }}"
    state: present
    pull: missing

# Healthcheck via le port HTTP local du container Pangolin (3001, API interne).
# On ne teste PAS via le port 80 host car (a) Traefik passe par l'entrypoint
# websecure (TLS) qui exige un cert valide, (b) le challenge DNS-01 peut
# encore être en cours juste après le up.
- name: Wait for Pangolin internal API to respond
  community.docker.docker_container_exec:
    container: "{{ _pangolin_container_name }}"
    command: curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:3001/api/v1/
    chdir: /
  register: _pangolin_api_health
  retries: 30
  delay: 5
  until: _pangolin_api_health.rc == 0
  changed_when: false
  # Read-only health probe — autorisée en --check pour valider l'idempotence
  # complète du rôle sans avoir à skip ce step. Sans ça, le module est skip
  # par --check et ne pose pas .rc, ce qui fait planter le `until` ci-dessus.
  check_mode: false
