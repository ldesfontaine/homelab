- name: Prepare pangolin directories and shared Docker network
  ansible.builtin.include_tasks: prep.yml
  tags:
    - pangolin
    - pangolin-prep

- name: Deploy Pangolin compose stack and configuration files
  ansible.builtin.include_tasks: deploy.yml
