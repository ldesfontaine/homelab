---
# ===========================================================================
# Variables surchargeables du rôle `pangolin`
# ===========================================================================
# Référence : docs/adr/ADR-000-fondations-ansible.md
#             docs/adr/ADR-001-stack-technique.md (Pangolin comme reverse proxy public)
#             docs/adr/ADR-002-firewall-strategy.md (seul container à exposer 80/443)
# Topologie upstream : https://docs.pangolin.net/self-host/manual/docker-compose
# ===========================================================================

# ───────────────────────────────────────────────────────────────────────────
# Versions — épingler explicitement (cf. anti-pattern :latest dans CLAUDE.md)
# ───────────────────────────────────────────────────────────────────────────
# Vérifier https://github.com/fosrl/pangolin/releases avant un upgrade.
pangolin_version: "1.18.4"
pangolin_image: "docker.io/fosrl/pangolin"

# Gerbil termine les tunnels WireGuard des agents Newt côté homelab.
# En session 4, AUCUN agent n'est encore déployé : Gerbil tourne à vide.
# On le garde tout de même car Traefik est en network_mode: service:gerbil
# (les ports 80/443 et UDP WG sont publiés par Gerbil — pattern upstream).
pangolin_gerbil_version: "1.4.0"
pangolin_gerbil_image: "docker.io/fosrl/gerbil"

# Traefik — pin sur la mineure validée par Pangolin upstream.
pangolin_traefik_version: "v3.6"
pangolin_traefik_image: "docker.io/traefik"

# Plugin CrowdSec bouncer pour Traefik (session 5). Vérifier la dernière
# version stable compatible Traefik v3 :
#   https://github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin/releases
# La valeur peut être surchargée dans inventory/group_vars/vps/vars.yml.
pangolin_traefik_plugin_crowdsec_version: "v1.6.0"

# ───────────────────────────────────────────────────────────────────────────
# Identité applicative
# ───────────────────────────────────────────────────────────────────────────
pangolin_admin_email: "lucas@{{ homelab_domain }}"
# Secret du seed admin créé au premier boot. Le formulaire de Pangolin
# (first-run wizard) propose une création manuelle si le seed n'est pas
# consommé — cf. runbook session-4.
pangolin_admin_password: "{{ vault_pangolin_admin_password }}"

# URL du dashboard Pangolin (admin UI). Utilisé pour CORS et redirections.
pangolin_dashboard_url: "https://{{ homelab_fqdn_pangolin }}"

# Secret de session Pangolin (server.secret du config.yml). Régénérable
# via `openssl rand -base64 48`. On réutilise vault_portfolio_payload_secret
# par défaut UNIQUEMENT si l'utilisateur n'a pas encore créé un secret dédié
# — à OVERRIDE en surchargeant `pangolin_server_secret` dans le vault.
pangolin_server_secret: "{{ vault_pangolin_admin_password }}"

# ───────────────────────────────────────────────────────────────────────────
# Certificats Let's Encrypt — DNS-01 via Cloudflare
# DNS-01 est préféré à HTTP-01 : (a) supporte les wildcards (futur LXCs),
# (b) résilient à une indispo temporaire du port 80, (c) ne dépend pas de la
# bascule DNS pour émettre les premiers certs.
# ───────────────────────────────────────────────────────────────────────────
# Email contact ACME. Let's Encrypt s'en sert UNIQUEMENT pour alerter en
# cas d'échec de renouvellement (~20j avant expiration). C'est la dernière
# corde de rappel avant un black-out cert — on veut donc une vraie boîte
# que Lucas relève réellement, et on la garde hors du repo public (Gmail
# en clair dans vars.yml = spam scraping garanti).
pangolin_letsencrypt_email: "{{ vault_letsencrypt_email }}"
pangolin_cloudflare_api_token: "{{ vault_cloudflare_api_token }}"
pangolin_letsencrypt_ca_server: "https://acme-v02.api.letsencrypt.org/directory"
# Pour rejouer sans risque de rate-limit (rotations cert) :
# pangolin_letsencrypt_ca_server: "https://acme-staging-v02.api.letsencrypt.org/directory"
pangolin_letsencrypt_resolver_name: "cloudflare"

# ───────────────────────────────────────────────────────────────────────────
# Stockage — compose + bind mounts pour le sous-arbre config Pangolin
# ───────────────────────────────────────────────────────────────────────────
pangolin_compose_dir: /opt/pangolin
# Pangolin/Gerbil/Traefik persistent leurs données sous {{ pangolin_compose_dir }}/config
# (alignement avec le compose upstream). Pas de volume nommé : tout le state
# est sur disque host, sauvegardable via un simple tar de /opt/pangolin.

# ───────────────────────────────────────────────────────────────────────────
# Réseau Docker — partagé avec les containers backend (portfolio, etc.)
# Le compose upstream utilise un network nommé "pangolin". On le conserve
# pour rester aligné, et on l'expose sous {{ pangolin_docker_network }} pour
# que les autres rôles le référencent symboliquement.
# ───────────────────────────────────────────────────────────────────────────
pangolin_docker_network: pangolin-net

# ───────────────────────────────────────────────────────────────────────────
# Ports publics exposés sur l'host — SEULS PORTS DOCKER PUBLICS DU VPS
# (cf. ADR-002 — Pangolin/Gerbil est le seul container à publier des ports).
# ───────────────────────────────────────────────────────────────────────────
pangolin_port_http: 80
pangolin_port_https: 443
# Ports WireGuard de Gerbil — exposés par le compose mais BLOQUÉS par
# défaut côté UFW (l'agent Newt côté homelab n'est pas encore configuré).
# À ouvrir explicitement quand session "Newt tunnel" arrivera.
pangolin_port_wg_data: 51820
pangolin_port_wg_control: 21820

# ───────────────────────────────────────────────────────────────────────────
# Routes statiques déclarées via le file provider de Traefik (en plus des
# routes que Pangolin sert via son HTTP provider pour son propre dashboard).
#
# Session 4 : portfolio publique + redirect apex.
# Sessions suivantes : ces routes pourront migrer vers la gestion native
# Pangolin (resources via dashboard) ; pour l'instant on garde la déclaration
# IaC, alignée avec l'esprit du repo.
# ───────────────────────────────────────────────────────────────────────────
pangolin_routes:
  - name: portfolio
    hostname: "{{ homelab_fqdn_portfolio }}"
    backend_url: "http://portfolio:{{ pangolin_portfolio_backend_port }}"

  - name: apex-redirect
    hostname: "{{ homelab_domain }}"
    redirect_to: "https://{{ homelab_fqdn_portfolio }}"
    permanent: true

# Port d'écoute du container portfolio sur le réseau pangolin-net.
# Doit correspondre à `portfolio_container_port` dans le rôle portfolio.
pangolin_portfolio_backend_port: 3000

# Middlewares Traefik appliqués à tous les routers backend (clé `backend_url`)
# définis dans pangolin_routes. NE PAS appliquer aux routers redirect : ils
# pointent vers noop-service et leur seul rôle est le 308 vers le router cible.
# Vide par défaut — utiliser ce levier pour des middlewares génériques qui ne
# justifient pas leur propre feature flag (ex : rate-limit, headers de sécu).
# L'intégration CrowdSec a son flag dédié `pangolin_crowdsec_integration_enabled`.
pangolin_default_middlewares: []

# Feature flag intégration CrowdSec (session 5). Quand `true` :
#   - le plugin `crowdsec-bouncer` est défini dans la conf statique Traefik
#   - le middleware éponyme est défini dans le dynamic_config (file provider)
#   - et attaché à tous les routers backend (clé `backend_url`)
# Quand `false` : aucun appel LAPI, aucune référence au plugin → Pangolin
# peut tourner sans que le rôle `crowdsec` ait été déployé (debug,
# investigation, etc.). Convention IaC : chaque greffon optionnel (auth
# Authentik, OIDC, etc.) recevra son flag équivalent.
pangolin_crowdsec_integration_enabled: true
