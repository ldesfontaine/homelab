---
# ===========================================================================
# Rôle `hardening` — entrée principale
# ===========================================================================
# Délègue à devsec.hardening.os_hardening puis devsec.hardening.ssh_hardening.
# Cf. ADR-000 Décision 5.
# ===========================================================================

- name: Apply OS hardening
  ansible.builtin.import_tasks: os.yml
  when: hardening_apply_os | bool
  tags:
    - hardening
    - hardening-os

- name: Apply SSH hardening
  ansible.builtin.import_tasks: ssh.yml
  when: hardening_apply_ssh | bool
  tags:
    - hardening
    - hardening-ssh
