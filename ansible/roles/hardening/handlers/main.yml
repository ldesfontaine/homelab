---
# Restart sshd apres pose du drop-in d'exception AllowTcpForwarding.
# La task qui notifie utilise deja `validate: '/usr/sbin/sshd -t -f %s'`
# en amont -> le fichier est syntaxiquement valide avant l'arrivee ici.
# Le handler `Restart sshd` de devsec.hardening.ssh_hardening reste
# notifie separement par devsec quand son propre drop-in change ; les
# deux handlers sont independants (noms differents par convention du
# repo : gerondif vs imperatif upstream).
- name: Restarting sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted
