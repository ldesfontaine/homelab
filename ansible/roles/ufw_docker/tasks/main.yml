---
# ===========================================================================
# Rôle `ufw_docker` — intégration DOCKER-USER dans /etc/ufw/after.rules
# ===========================================================================
# Référence : docs/adr/ADR-002-firewall-strategy.md (Option C, couche 2)
#
# Approche : on n'installe PAS le script chaifeng/ufw-docker (dépendance
# runtime externe). On embarque le fragment iptables équivalent dans
# /etc/ufw/after.rules via blockinfile : 100 % offline, auditable, et
# couvert par le `backup: true`.
#
# La validation iptables-restore --test sur after.rules n'est pas posée :
# elle est fragile sous nftables-backend (Debian Trixie via iptables-nft)
# et le `backup: true` suffit comme filet de récupération. Le `Reloading
# ufw` handler échouera bruyamment si le fragment est invalide.
# ===========================================================================

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: apt
  tags:
    - ufw-docker
    - firewall

- name: Verify UFW is installed (prerequisite for ufw-docker integration)
  ansible.builtin.assert:
    that:
      - _ufw_docker_ufw_package in ansible_facts.packages
    fail_msg: >-
      UFW ({{ _ufw_docker_ufw_package }}) is not installed.
      Run the `bootstrap` role first — UFW is set up in playbooks/bootstrap.yml.
  tags:
    - ufw-docker
    - firewall

- name: Insert ufw-docker integration block into after.rules
  ansible.builtin.blockinfile:
    path: "{{ _ufw_docker_after_rules_path }}"
    marker: "{{ ufw_docker_marker }}"
    insertafter: EOF
    backup: true
    block: |
      # BEGIN UFW AND DOCKER (ADR-002 — chaifeng/ufw-docker integration)
      *filter
      :DOCKER-USER - [0:0]
      :ufw-user-forward - [0:0]
      :ufw-docker-logging-deny - [0:0]

      -A DOCKER-USER -j ufw-user-forward

      # Established / related return traffic
      -A DOCKER-USER -m conntrack --ctstate RELATED,ESTABLISHED -j RETURN

      # Internal docker0 <-> docker0 traffic (bridge réseau Docker par défaut)
      -A DOCKER-USER -i docker0 -o docker0 -j ACCEPT

      # Private networks (RFC1918) : LAN, WG, réseaux Docker internes
      {% for net in ufw_docker_private_networks %}
      -A DOCKER-USER -j RETURN -s {{ net }}
      {% endfor %}

      # Default deny — toute NEW conn externe vers un container Docker
      # est journalisée puis droppée, MÊME si Docker a publié un port.
      -A DOCKER-USER -m conntrack --ctstate NEW -j ufw-docker-logging-deny

      # Logging rate-limité + drop final
      -A ufw-docker-logging-deny -m limit --limit 3/min --limit-burst 10 -j LOG --log-prefix "[UFW DOCKER BLOCK] "
      -A ufw-docker-logging-deny -j DROP

      COMMIT
      # END UFW AND DOCKER
  notify: Reloading ufw
  tags:
    - ufw-docker
    - firewall

- name: Ensure UFW logging is enabled (required to see ufw-docker-logging-deny entries)
  community.general.ufw:
    logging: 'on'
  tags:
    - ufw-docker
    - firewall
