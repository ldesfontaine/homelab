[defaults]
inventory                      = ./inventory
roles_path                     = ./roles
collections_path               = ./.collections
host_key_checking              = False
retry_files_enabled            = False
stdout_callback                = yaml
gathering                      = smart
fact_caching                   = jsonfile
fact_caching_connection        = ./.cache/facts
fact_caching_timeout           = 7200
vault_password_file            = /home/lucas/.ansible/vault-pass-homelab.txt
interpreter_python             = auto_silent
forks                          = 10
deprecation_warnings           = True
display_skipped_hosts          = False

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml, community.general.proxmox

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=3

[privilege_escalation]
become              = False
become_method       = sudo
become_user         = root
become_ask_pass     = False
