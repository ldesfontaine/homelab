<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Schéma physique du homelab ldesfontaine</title>
<desc>Topologie physique : Internet via fibre Orange arrive sur LiveBox 6 qui fonctionne en simple modem (aucun port forward, aucun DMZ Host). OPNsense N150 est connecté sur son port WAN. OPNsense distribue par ses 6 ports vers le switch Netgear MS305E (trunk), le mini PC Proxmox (trunk), et le Pi5 PBS (VLAN 99). Un port RESCUE est laissé volontairement vide pour les pannes. Le switch dessert l'AP UniFi U6 Lite en trunk pour les SSIDs WiFi, et trois postes en VLAN 20. Un VPS Hetzner externe héberge Pangolin, le portfolio statique, CrowdSec et le hub WireGuard WG-ADMIN-RELAY pour l&#39;admin externe.</desc>
