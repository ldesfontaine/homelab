<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Schéma logique du homelab — VLANs et services</title>
<desc>Architecture logique segmentée en 7 VLANs avec OPNsense comme passerelle et firewall. Externe : visiteurs Internet, Cloudflare DNS, et VPS Hetzner avec Pangolin/CrowdSec/portfolio. Tunnel WG-PUB depuis VPS vers Newt dans le VLAN EXPOSED. OPNsense gère firewall, routage VLAN, endpoint WG-ADMIN, Unbound DNS split-horizon, Suricata IDS. VLANs trustés : MGMT, LAN, SVC_PRIV (Authentik IDP central), BACKUP isolé. VLANs restreints : EXPOSED (Newt uniquement), IOT, LAB.</desc>
